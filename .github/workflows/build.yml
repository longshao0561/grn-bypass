name: Build GRN Bypass

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git build-essential fakeroot libclang-dev
    
    - name: Build tweak
      run: make
    
    - name: Upload dylib
      uses: actions/upload-artifact@v4
      with:
        name: grnbypass
        path: .theos/obj/debug/*.dylib
